{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Contact Us - TestimonialsHub{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4 p-md-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 64px; height: 64px;">
                        <i class="fas fa-envelope fa-2x"></i>
                    </div>
                    <h2 class="card-title fw-bolder">Get In Touch</h2>
                    <p class="text-muted">Have questions or simply want to say hello? Send us a message and we'll respond promptly.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4 pt-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Send Message <i class="fas fa-paper-plane ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
