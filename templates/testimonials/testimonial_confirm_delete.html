{% extends 'base.html' %}
{% block title %}Delete Review - TestimonialsHub{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-4 p-md-4 text-center">
            <div class="card-body p-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-danger text-white rounded-circle mb-4 shadow" style="width: 80px; height: 80px;">
                    <i class="fas fa-exclamation-triangle fa-3x"></i>
                </div>
                <h2 class="card-title fw-bolder mb-3 text-dark">Delete Review?</h2>
                <p class="text-muted mb-4">Are you sure you want to delete this testimonial? This action cannot be undone.</p>
                
                <div class="bg-light p-4 rounded-4 mb-4 text-start font-italic border fs-5">
                    "{{ object.message|truncatewords:20 }}"
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'dashboard' %}" class="btn btn-light btn-lg rounded-pill px-4 shadow-sm">Cancel</a>
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill px-4 shadow-sm">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
