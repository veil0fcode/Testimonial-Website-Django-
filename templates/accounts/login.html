{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login - TestimonialsHub{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-4 p-md-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 64px; height: 64px;">
                        <i class="fas fa-sign-in-alt fa-2x"></i>
                    </div>
                    <h2 class="card-title fw-bolder">Welcome Back</h2>
                    <p class="text-muted">Please log in to your account</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4 pt-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Login</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
