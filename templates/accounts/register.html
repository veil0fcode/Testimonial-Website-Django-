{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register - TestimonialsHub{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4 mb-4">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4 p-md-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 64px; height: 64px;">
                        <i class="fas fa-user-plus fa-2x"></i>
                    </div>
                    <h2 class="card-title fw-bolder">Join TestimonialsHub</h2>
                    <p class="text-muted">Create an account to share your thoughts.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4 pt-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Create Account</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Log in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
